# Fly.io config for Expense Tracker
# Deploy: fly deploy
# Create volume first: fly volumes create expense_data -r <your-region>

app = "expense-tracker"

[build]

[env]
  DATA_DIR = "/app/data"

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "expense_data"
  destination = "/app/data"
